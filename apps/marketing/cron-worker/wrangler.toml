name = "ednsy-marketing-cron"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Call your Vercel app cron endpoints.
# Set CRON_TARGET_URL below (or in Dashboard → Settings → Variables).
# Set CRON_SECRET via: npx wrangler secret put CRON_SECRET
[vars]
# Base URL of the marketing app, no trailing slash (override for production).
CRON_TARGET_URL = "https://leadrosetta.ednsy.com"

[triggers]
# Demo: every 1 min. GBP: every 2 min. Worker branches on controller.cron.
crons = ["*/1 * * * *", "*/2 * * * *"]
