name = "lead-rosetta-cron"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Lead Rosetta: set CRON_TARGET_URL and CRON_SECRET (secret).
# Pitch Rosetta: set PITCH_ROSETTA_URL to ping health (keeps Render awake).
[vars]
CRON_TARGET_URL = "https://leadrosetta.ednsy.com"
# Pitch Rosetta base URL (GET /api/health), no trailing slash.
PITCH_ROSETTA_URL = "https://pitch-rosetta.onrender.com"

[triggers]
# Single trigger to stay within Cloudflare Free "Cron Triggers per account" (5). Handler runs every minute and
# dispatches GBP (*/2), insights (*/3), batch (*/5), pitch ping (*/14) by UTC minute — same as separate crons.
# See: https://developers.cloudflare.com/workers/platform/limits/#account-plan-limits
crons = ["*/1 * * * *"]
